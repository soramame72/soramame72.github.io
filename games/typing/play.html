<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="icon" href="https://soramame72-games.github.io/favicon.PNG" type="image/png">
    <meta charset="Shift_JIS">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>typing</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Times New Roman", serif;
            background: #f0f0f0;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border: 1px solid #ccc;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 10px;
            background: #f8f8f8;
            border: 1px solid #ddd;
            font-size: 14px;
        }

        .game-area {
            height: 350px;
            border: 2px solid #333;
            background: #e8e8e8;
            position: relative;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .word-item {
            background: white;
            border: 1px solid #999;
            padding: 20px 30px;
            border-radius: 5px;
            font-size: 36px;
            white-space: nowrap;
            font-family: "Times New Roman", serif;
            position: static;
        }

        @keyframes moveLeft {
            from { right: -300px; }
            to { right: 100%; }
        }

        .word-item.current {
            background: #ffffcc;
            border: 3px solid #ff6600;
            box-shadow: 0 0 10px rgba(255, 102, 0, 0.3);
        }

        .char {
            position: relative;
        }

        .char.typed {
            background-color: #90EE90;
            color: #006400;
        }

        .char.current {
            background-color: #0066ff;
            color: white;
        }

        .controls {
            text-align: center;
            margin-bottom: 20px;
        }

        .btn {
            padding: 10px 20px;
            margin: 0 5px;
            border: 1px solid #999;
            background: #f0f0f0;
            cursor: pointer;
            font-size: 14px;
            font-family: "Times New Roman", serif;
        }

        .btn:hover {
            background: #e0e0e0;
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            background: #f8f8f8;
            border: 1px solid #ddd;
            margin-bottom: 20px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #0066cc;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
        }

        .result {
            text-align: center;
            padding: 20px;
            background: #e8f4f8;
            border: 1px solid #0066cc;
            display: none;
        }

        .level-select {
            text-align: center;
            margin-bottom: 20px;
        }

        .level-btn {
            padding: 10px 20px;
            margin: 0 5px;
            border: 1px solid #999;
            background: #f0f0f0;
            cursor: pointer;
            font-family: "Times New Roman", serif;
        }

        .level-btn.active {
            background: #0066cc;
            color: white;
        }

        .instructions {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
        }

        .instructions h3 {
            margin-bottom: 10px;
            color: #856404;
        }

        .instructions ul {
            margin-left: 20px;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>typing</h1>
            <p>製作者soramame72</p>
        </div>

        <div class="instructions">
            <h3>遊び方</h3>
            <ul>
                <li>Enterキーまたはspaceキーでゲーム開始</li>
                <li>流れてくる文字をキーボードで入力</li>
                <li>青色にハイライトされた文字が次に入力する文字です</li>
                <li>ESCキーでゲーム終了</li>
            </ul>
        </div>

        <div class="level-select">
            <button class="level-btn active" data-level="easy">初級</button>
            <button class="level-btn" data-level="normal">中級</button>
            <button class="level-btn" data-level="hard">上級</button>
        </div>

        <div class="game-info">
            <span>残り時間: <span id="timeLeft">60</span>秒</span>
            <span>完了単語: <span id="completed">0</span>個</span>
            <span>得点: <span id="score">0</span>点</span>
            <span>ミス: <span id="miss">0</span>回</span>
        </div>

        <div class="game-area" id="gameArea">
            <!-- 文字が流れる場所 -->
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="wpm">0</div>
                <div class="stat-label">打/分</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="accuracy">100</div>
                <div class="stat-label">正打率(%)</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="speed">0</div>
                <div class="stat-label">打/秒</div>
            </div>
        </div>

        <div class="result" id="result">
            <h2>結果発表</h2>
            <div id="finalResult"></div>
        </div>
    </div>

    <script>
        class SimpleTypingGame {
            constructor() {
                this.words = {
                    easy: [
                        "cat", "dog", "pen", "car", "sun", "moon", "star", "book", "desk", "tree",
                        "apple", "house", "water", "light", "music", "happy", "smile", "heart", "ball", "bird", "fish", "milk", "bread", "school", "chair", "door", "window", "rain", "cloud", "warm", "run", "jump", "read", "write", "blue", "green", "cup", "bed", "box", "hat", "toy", "cake", "egg", "leaf", "rock", "sand", "ice", "snow", "wind", "road", "train", "bike", "hand", "foot", "eyes", "nose"
                    ],
                    normal: [
                        "computer", "keyboard", "program", "website", "internet", "language", "function",
                        "variable", "database", "security", "algorithm", "framework", "developer", "energy", "trevel", "nature", "planet", "system", "memory", "history", "culture", "science", "future", "reason", "moment", "freedom", "purpose", "justice", "balance", "emotion", "belief", "choice", "danger", "growth", "journey", "power", "dream", "vision", "truth"
                    ],
                    hard: [
                        "programming", "development", "architecture", "implementation", "documentation",
                        "optimization", "performance", "compatibility", "functionality", "methodology", "configuration", "integration", "collaboration", "automation", "validation", "interaction", "representation", "accessibility", "maintenance", "specification", "implementation", "transformation", "evaluation", "innovation", "communication", "authorization", "navigation", "coordination", "manipulaion", "interpretation"
                    ]
                };
                
                this.gameTime = { easy: 60, normal: 60, hard: 60 };
                this.spawnInterval = { easy: 2500, normal: 2000, hard: 1500 };
                this.wordSpeed = { easy: 10, normal: 8, hard: 6 };
                this.scoreMultiplier = { easy: 1, normal: 2, hard: 3 };
                
                this.currentLevel = 'easy';
                this.timeLeft = 60;
                this.completed = 0;
                this.score = 0;
                this.miss = 0;
                this.totalChars = 0;
                this.correctChars = 0;
                this.startTime = 0;
                this.isGameActive = false;
                this.currentWord = null;
                this.gameTimer = null;
                this.wordInterval = null;
                this.activeWords = [];
                
                this.initializeElements();
                
                this.initializeElements();
                this.setupEventListeners();
            }
            
            initializeElements() {
                this.gameArea = document.getElementById('gameArea');
                this.startBtn = document.getElementById('startBtn');
                this.resetBtn = document.getElementById('resetBtn');
                this.timeLeftDisplay = document.getElementById('timeLeft');
                this.completedDisplay = document.getElementById('completed');
                this.scoreDisplay = document.getElementById('score');
                this.missDisplay = document.getElementById('miss');
                this.wpmDisplay = document.getElementById('wpm');
                this.accuracyDisplay = document.getElementById('accuracy');
                this.speedDisplay = document.getElementById('speed');
                this.resultDisplay = document.getElementById('result');
                this.finalResultDisplay = document.getElementById('finalResult');
                this.levelButtons = document.querySelectorAll('.level-btn');
            }
            
            setupEventListeners() {
                
                document.addEventListener('keydown', (e) => this.handleKeyPress(e));
                
                this.levelButtons.forEach(btn => {
                    btn.addEventListener('click', (e) => this.changeLevel(e.target.dataset.level));
                });
            }
            
            changeLevel(level) {
                this.currentLevel = level;
                this.timeLeft = this.gameTime[level];
                this.timeLeftDisplay.textContent = this.timeLeft;
                
                this.levelButtons.forEach(btn => btn.classList.remove('active'));
                document.querySelector(`[data-level="${level}"]`).classList.add('active');
                
                this.resetGame();
            }
            
            startGame() {
                // ゲーム開始前にリセット処理を追加
                if (!this.isGameActive) {
                    this.completed = 0;
                    this.score = 0;
                    this.miss = 0;
                    this.totalChars = 0;
                    this.correctChars = 0;
                    this.timeLeft = this.gameTime[this.currentLevel];
                    this.currentWord = null;
        
                    // ゲームエリアをクリア
                    this.gameArea.innerHTML = '';
        
                    // 表示を更新
                    this.completedDisplay.textContent = '0';
                    this.scoreDisplay.textContent = '0';
                    this.missDisplay.textContent = '0';
                    this.wpmDisplay.textContent = '0';
                    this.accuracyDisplay.textContent = '100';
                    this.speedDisplay.textContent = '0';
                    this.timeLeftDisplay.textContent = this.timeLeft;
                }
    
                this.isGameActive = true;
                this.startTime = Date.now();
                this.resultDisplay.style.display = 'none';
    
                this.gameTimer = setInterval(() => {
                    this.timeLeft--;
                    this.timeLeftDisplay.textContent = this.timeLeft;
                    this.updateStats();
        
                     if (this.timeLeft <= 0) {
                         this.endGame();
                     }
                }, 1000);
    
                this.wordInterval = setInterval(() => {
                    // 自動で新しい単語を生成する必要がないので削除
                }, this.spawnInterval[this.currentLevel]);
    
                this.spawnWord();
            }
            
            spawnWord() {
                if (!this.isGameActive || this.currentWord) return;
                
                const wordList = this.words[this.currentLevel];
                const word = wordList[Math.floor(Math.random() * wordList.length)];
                
                // 前の単語があれば削除
                const existingWord = this.gameArea.querySelector('.word-item');
                if (existingWord) {
                    existingWord.remove();
                }
                
                const wordElement = document.createElement('div');
                wordElement.className = 'word-item';
                wordElement.dataset.text = word;
                
                // 文字を個別にspan要素で包む
                const chars = word.split('');
                wordElement.innerHTML = chars.map((char, index) => 
                    `<span class="char" data-index="${index}">${char}</span>`
                ).join('');
                
                this.gameArea.appendChild(wordElement);
                this.currentWord = {
                    element: wordElement,
                    text: word,
                    typedIndex: 0
                };
                
                wordElement.classList.add('current');
                this.updateCurrentCharHighlight();
            }
            
            setCurrentWord(word) {
                // 使用しない関数
            }
            
            updateCurrentCharHighlight() {
                if (!this.currentWord) return;
                
                const chars = this.currentWord.element.querySelectorAll('.char');
                chars.forEach((char, index) => {
                    char.classList.remove('current');
                    if (index < this.currentWord.typedIndex) {
                        char.classList.add('typed');
                    } else if (index === this.currentWord.typedIndex) {
                        char.classList.add('current');
                    }
                });
            }
            
            setNextWord() {
                // 次の単語を生成
                this.spawnWord();
            }
            
            handleKeyPress(e) {
                if (!this.isGameActive) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        this.startGame();
                        return;
                    }
                    return;
                }
                // ゲーム中はEnterとSpaceキーを無視
                if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                return;
                }
                if (e.key === 'Escape') {
                    this.endGame();
                    return;
                }
                
                if (!this.currentWord) return;
                
                const targetChar = this.currentWord.text[this.currentWord.typedIndex];
                const inputChar = e.key;
                
                this.totalChars++;
                
                if (inputChar === targetChar) {
                    // 正解
                    this.correctChars++;
                    this.currentWord.typedIndex++;
                    
                    if (this.currentWord.typedIndex >= this.currentWord.text.length) {
                        // 単語完成
                        this.completed++;
                        this.score += this.currentWord.text.length * this.scoreMultiplier[this.currentLevel];
                        
                        this.completedDisplay.textContent = this.completed;
                        this.scoreDisplay.textContent = this.score;
                        
                        this.currentWord.element.remove();
                        this.currentWord = null;
                        this.setNextWord();
                    } else {
                        this.updateCurrentCharHighlight();
                    }
                } else {
                    // ミス
                    this.miss++;
                    this.missDisplay.textContent = this.miss;
                }
                
                this.updateStats();
            }
            
            updateStats() {
                if (this.startTime === 0) return;
                
                const elapsed = (Date.now() - this.startTime) / 1000;
                const wpm = elapsed > 0 ? Math.round((this.correctChars / 5) / (elapsed / 60)) : 0;
                const accuracy = this.totalChars > 0 ? Math.round((this.correctChars / this.totalChars) * 100) : 100;
                const speed = elapsed > 0 ? Math.round(this.correctChars / elapsed) : 0;
                
                this.wpmDisplay.textContent = wpm;
                this.accuracyDisplay.textContent = accuracy;
                this.speedDisplay.textContent = speed;
            }
            
            endGame() {
                this.isGameActive = false;
                clearInterval(this.gameTimer);
                clearInterval(this.wordInterval);
                
                // 現在の単語を削除
                if (this.currentWord && this.currentWord.element.parentNode) {
                    this.currentWord.element.remove();
                }
                this.currentWord = null;
                this.timeLeft = this.gameTime[this.currentLevel];
                this.timeLeftDisplay.textContent = this.timeLeft;
                
                this.finalResultDisplay.innerHTML = `
                    <p><strong>このようなゲームをもっとプレイしたいですか?soramame72をフォローしてください!</strong></p>
                    <p>最終得点: ${this.score}点</p>
                    <p>完了単語: ${this.completed}個</p>
                    <p>ミス: ${this.miss}回</p>
                    <p>正打率: ${this.accuracyDisplay.textContent}%</p>
                    <p>平均打/分: ${this.wpmDisplay.textContent}</p>
                    <p>レベル: ${this.currentLevel === 'easy' ? '初級' : this.currentLevel === 'normal' ? '中級' : '上級'}</p>
                `;
                
                this.resultDisplay.style.display = 'block';
            }
            
            resetGame() {
                this.isGameActive = false;
                this.timeLeft = this.gameTime[this.currentLevel];
                this.completed = 0;
                this.score = 0;
                this.miss = 0;
                this.totalChars = 0;
                this.correctChars = 0;
                this.startTime = 0;
                this.currentWord = null;
                
                clearInterval(this.gameTimer);
                clearInterval(this.wordInterval);
                
                
                // ゲームエリア内の全ての単語要素を削除
                this.gameArea.innerHTML = '';
                
                this.timeLeftDisplay.textContent = this.timeLeft;
                this.completedDisplay.textContent = '0';
                this.scoreDisplay.textContent = '0';
                this.missDisplay.textContent = '0';
                this.wpmDisplay.textContent = '0';
                this.accuracyDisplay.textContent = '100';
                this.speedDisplay.textContent = '0';
                
                this.resultDisplay.style.display = 'none';
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            new SimpleTypingGame();
        });
    </script>
</body>
</html>
