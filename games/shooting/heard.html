<HTML><HEAD><META HTTP-EQUIV="Content-Type" CONTENT="text/html; charset=Shift_JIS"><TITLE>東方風シューティングゲーム(ハード)</TITLE><LINK REL="icon" HREF="favicon.png" TYPE="image/png"><STYLE>html, body{margin:0;padding:0;background:black;font-family:'Arial',sans-serif;overflow:hidden;height:100%;}#container{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(1);transform-origin:center center;}canvas{display:block;background:black;}#startScreen, #endScreen{position:absolute;top:0;left:0;width:480px;height:800px;background:rgba(0,0,0,0.8);color:white;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:10;}button{padding:10px 20px;font-size:20px;margin-top:20px;}@keyframes titleFadeIn{0%{opacity:0;}100%{opacity:1;}}label{animation:titleFadeIn 2s ease-in-out;}h1{font-size:45px;animation:titleFadeIn 2s ease-in-out;}#startScreen p, #endScreen p{font-size:24px;animation:titleFadeIn 2s ease-in-out;}#startScreen button, #endScreen button{font-size:24px;animation:titleFadeIn 2s ease-in-out;}#credit{font-size:16px;margin-top:20px;text-align:center;animation:titleFadeIn 2s ease-in-out;}select{font-size:24px;margin-top:20px;padding:10px;animation:titleFadeIn 2s ease-in-out;}a{color:lightblue;}</STYLE></HEAD><BODY><DIV ID="container"><CANVAS ID="gameCanvas" WIDTH="480" HEIGHT="800"></CANVAS><DIV ID="startScreen"><H1>東方風シューティング(ハード)</H1><P>[F11]キーでフルスクリーンでプレイすることを推奨します</P><LABEL FOR="characterSelect">キャラクター選択:</LABEL><SELECT ID="characterSelect" onchange="selectCharacter()"><OPTION VALUE="reimu">霊夢</OPTION><OPTION VALUE="marisa">魔理沙</OPTION></SELECT><BUTTON onclick="startGame()">ゲーム開始</BUTTON><DIV ID="credit"><P>このゲームは東方Projectの二次創作です</P><P>遊び方: <A HREF="http://docs.google.com/document/d/13ysh6FmDHpq3-a4MXsAWtbXHn8vbVP6fz2Ucs3bRO1o/edit" TARGET="_blank">google document</A></P><P>キャラクター立ち絵: <A HREF="http://twitter.com/_Hoshi_Ringo_" TARGET="_blank">星りんご</A></P><P>音楽: <A HREF="http://ajapabgm.html.xdomain.jp/" TARGET="_blank">ajapaのBGM</A></P></DIV></DIV><DIV ID="endScreen" STYLE="display:none;"><H1 ID="endMessage"></H1><P>スコア: <SPAN ID="finalScore"></SPAN></P><P>ハイスコア: <SPAN ID="highScore"></SPAN></P><BUTTON onclick="restartGame()">リトライ</BUTTON></DIV></DIV><AUDIO ID="bgm" SRC="music.mp3" LOOP></AUDIO><SCRIPT>function checkDeviceAndSize(){const screenWidth=window.innerWidth;const screenHeight=window.innerHeight;if(screenWidth<=480&&screenHeight<=800||screenWidth<=800&&screenHeight<=480){alert('このゲームはPC向けに作成されているため、動作が安定しない可能性があります。');}else if(!window.navigator.userAgent.match(/Windows|Macintosh|Linux/i)){alert('このゲームはPC向けに作成されているため、動作が安定しない可能性があります。');}}const canvas=document.getElementById('gameCanvas');const ctx=canvas.getContext('2d');const audio=document.getElementById('bgm');let gameRunning=false;let bullets=[],bossBullets=[],enemies=[];let highScore=localStorage.getItem('touhouHighScore')||0;let characterSelected='reimu';const player={x:canvas.width/2,y:canvas.height-100,width:55,height:85,hp:100,score:0,shield:false,image:new Image(),bombCooldown:0,invincibleTime:0};const boss={x:canvas.width/2-50,y:100,width:55,height:85,hp:6000,maxHp:6000,attackTimer:0,attackInterval:60,targetX:Math.random()*canvas.width,targetY:Math.random()*canvas.height,speed:2,spellActive:false,image:new Image(),};boss.image.src='boss.png';let keys={};window.addEventListener('keydown',function(e){if(e.key===' '&&gameRunning)e.preventDefault();keys[e.key]=true;});window.addEventListener('keyup',function(e){keys[e.key]=false;});class Bullet{constructor(x,y,speed,angle,fromBoss=false,isLarge=false){this.x=x;this.y=y;this.speed=speed;this.angle=angle;this.fromBoss=fromBoss;this.isLarge=isLarge;}update(){this.x+=Math.cos(this.angle)*this.speed;this.y+=Math.sin(this.angle)*this.speed;if(this.x<0||this.x>canvas.width||this.y<0||this.y>canvas.height){const index=bullets.indexOf(this);if(index>-1){bullets.splice(index,1);}}}draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.isLarge?10:5,0,Math.PI*2);ctx.fillStyle=this.fromBoss?'red':'cyan';ctx.fill();}}class Enemy{constructor(x,y){this.x=x;this.y=y;this.width=30;this.height=60;this.hp=30;this.speed=2+Math.random();this.image=new Image();this.image.src='enemy.png';}update(){this.x+=Math.random()*2-1;this.y+=this.speed;if(this.y>canvas.height){const index=enemies.indexOf(this);if(index>-1){enemies.splice(index,1);}}}draw(){ctx.drawImage(this.image,this.x,this.y,this.width,this.height);}}function selectCharacter(){characterSelected=document.getElementById('characterSelect').value;if(characterSelected==='marisa'){player.width=55;player.height=55;player.image.src='marisa.png';}else{player.width=55;player.height=85;player.image.src='reimu.png';}}function drawSpellEffect(){if(boss.spellActive){ctx.fillStyle='rgba(255,0,255,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);}}function updatePlayer(){if(keys['ArrowUp']||keys['w'])player.y-=5;if(keys['ArrowDown']||keys['s'])player.y+=5;if(keys['ArrowLeft']||keys['a'])player.x-=5;if(keys['ArrowRight']||keys['d'])player.x+=5;player.x=Math.max(0,Math.min(player.x,canvas.width-player.width));player.y=Math.max(0,Math.min(player.y,canvas.height-player.height));if(keys[' ']){if(Math.random()>0.1){bullets.push(new Bullet(player.x+player.width/2,player.y,6,-Math.PI/2));}}if(keys['null']&&player.bombCooldown<=0){bossBullets=[];player.shield=true;player.invincibleTime=120;player.bombCooldown=300;}if(player.invincibleTime>0){player.invincibleTime--;if(player.invincibleTime===0)player.shield=false;}if(player.bombCooldown>0)player.bombCooldown--;}boss.attackInterval=60/3;function updateBoss(){boss.attackTimer++;if(boss.attackTimer>=boss.attackInterval){boss.attackTimer=0;boss.spellActive=Math.random()<0.3;fireCircleBullets();}let angle=Math.atan2(boss.targetY-boss.y,boss.targetX-boss.x);boss.x+=Math.cos(angle)*boss.speed;boss.y+=Math.sin(angle)*boss.speed;if(Math.abs(boss.x-boss.targetX)<5&&Math.abs(boss.y-boss.targetY)<5){boss.targetX=Math.random()*canvas.width;boss.targetY=Math.random()*(canvas.height*0.25)+canvas.height*0.25;}}function fireCircleBullets(){const hpRatio=boss.hp/boss.maxHp;const baseCount=42;const maxExtra=48;const count=baseCount+Math.floor((1-hpRatio)*maxExtra);for(let i=0;i<count;i++){const angle=(Math.PI*2*i)/count;const baseSpeed=1.5+Math.random()*2.5;const extraSpeed=(1.5-hpRatio)*2.5;const speed=baseSpeed+extraSpeed;const isLarge=Math.random()<0.5;bossBullets.push(new Bullet(boss.x+boss.width/2,boss.y+boss.height,speed,angle,true,isLarge));}}function spawnEnemy(){if(Math.random()<0.02){let x=Math.random()*(canvas.width-40);enemies.push(new Enemy(x,-110));}}function checkCollisions(){const hitboxSize=10;const hitboxX=player.x+player.width/2-hitboxSize/2;const hitboxY=player.y+player.height/2-hitboxSize/2;bullets.forEach((b,i)=>{enemies.forEach((e,j)=>{if(b.x>e.x&&b.x<e.x+e.width&&b.y>e.y&&b.y<e.y+e.height){enemies.splice(j,1);bullets.splice(i,1);player.score+=100;}});if(b.x>boss.x&&b.x<boss.x+boss.width&&b.y>boss.y&&b.y<boss.y+boss.height){boss.hp-=1;bullets.splice(i,1);}});bossBullets.forEach((b,i)=>{if(b.x>hitboxX&&b.x<hitboxX+hitboxSize&&b.y>hitboxY&&b.y<hitboxY+hitboxSize){if(!player.shield)player.hp-=10;bossBullets.splice(i,1);}});enemies.forEach((e,i)=>{if(e.x<hitboxX+hitboxSize&&e.x+e.width>hitboxX&&e.y<hitboxY+hitboxSize&&e.y+e.height>hitboxY){if(!player.shield)player.hp-=20;enemies.splice(i,1);}});console.log(bullets.length);console.log(bossBullets.length);console.log(enemies.length);}function drawBossHp(){let grad=ctx.createLinearGradient(0,0,canvas.width,0);grad.addColorStop(0,'#ff0000');grad.addColorStop(1,'#ff7f7f');ctx.fillStyle='black';ctx.fillRect(0,10,canvas.width,10);ctx.fillStyle=grad;ctx.fillRect(0,10,canvas.width*(boss.hp/boss.maxHp),10);}function drawBossName(){ctx.fillStyle='white';ctx.font='30px Arial';ctx.fillText('フランドール・スカーレット',canvas.width/2-150,40);}function drawBackground(){let grad=ctx.createLinearGradient(0,0,0,canvas.height);grad.addColorStop(0,'#222244');grad.addColorStop(1,'#000000');ctx.fillStyle=grad;ctx.fillRect(0,0,canvas.width,canvas.height);}function update(){if(!gameRunning)return;ctx.clearRect(0,0,canvas.width,canvas.height);drawBackground();drawSpellEffect();drawBossName();updatePlayer();ctx.drawImage(player.image,player.x,player.y,player.width,player.height);bullets.forEach(b=>{b.update();b.draw();});bossBullets.forEach(b=>{b.update();b.draw();});updateBoss();ctx.drawImage(boss.image,boss.x,boss.y,boss.width,boss.height);drawBossHp();spawnEnemy();enemies.forEach(e=>{e.update();e.draw();});checkCollisions();ctx.fillStyle='white';ctx.font='30px Arial';ctx.fillText(`HP: ${player.hp}`,20,30);ctx.fillText(`Score: ${player.score}`,20,60);if(player.hp<=0)endGame(false);if(boss.hp<=0)endGame(true);requestAnimationFrame(update);}function startGame(){selectCharacter();document.getElementById('startScreen').style.display='none';document.getElementById('endScreen').style.display='none';gameRunning=true;player.hp=100;player.score=0;player.bombCooldown=0;player.invincibleTime=0;player.shield=false;boss.hp=boss.maxHp;boss.attackTimer=0;enemies=[];bullets=[];bossBullets=[];audio.currentTime=0;audio.play();update();}function restartGame(){location.reload();}function endGame(cleared){gameRunning=false;audio.pause();document.getElementById('endScreen').style.display='flex';document.getElementById('finalScore').textContent=player.score;if(player.score>highScore){localStorage.setItem('touhouHighScore',player.score);document.getElementById('highScore').textContent=player.score;}else{document.getElementById('highScore').textContent=highScore;}document.getElementById('endMessage').textContent=cleared?'ゲームクリア！':'ゲームオーバー';}function resize(){const container=document.getElementById('container');const scaleX=window.innerWidth/480;const scaleY=window.innerHeight/800;const scale=Math.min(scaleX,scaleY);container.style.transform=`translate(-50%,-50%) scale(${scale})`;}window.addEventListener('resize',resize);window.addEventListener('load',resize);</SCRIPT></BODY></HTML>
